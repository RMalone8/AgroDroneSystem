events {
    worker_connections 1024;
}

http {
    upstream frontend {
        ip_hash;
        server frontend-1:5173;
        server frontend-2:5173;
    }

    upstream backend {
        server backend:8787;
    }

    # Internal HTTP — used by cloudflared (tunnel leg, not exposed externally)
    server {
        listen 80;

        location ~ ^/(auth|admin|flightplan|basestation|sensor|sensor-image) {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /mqtt {
            proxy_pass          http://mqtt:9001;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  86400s;
        }

        location /grafana/ {
            proxy_pass          http://grafana:3000;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_redirect      http://grafana:3000/ /grafana/;
            proxy_redirect      http://localhost/grafana/ /grafana/;
        }

        location /demo/ {
            proxy_pass         http://demo-orchestrator:8090/demo/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              localhost;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS — for direct access (e.g. local network)
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # --- Backend API ---
        location ~ ^/(auth|admin|flightplan|basestation|sensor|sensor-image) {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- MQTT over WebSocket (frontend broker connection) ---
        location /mqtt {
            proxy_pass          http://mqtt:9001;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  86400s;
        }

        # --- Grafana (admin telemetry dashboard) ---
        location /grafana/ {
            proxy_pass          http://grafana:3000;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_redirect      http://grafana:3000/ /grafana/;
            proxy_redirect      http://localhost/grafana/ /grafana/;
        }

        # --- Demo orchestrator ---
        location /demo/ {
            proxy_pass         http://demo-orchestrator:8090/demo/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Frontend (load balanced, with Vite HMR WebSocket support) ---
        location / {
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              localhost;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }
    }
}
