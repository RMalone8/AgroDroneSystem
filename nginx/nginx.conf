# TCP stream proxy — edge nodes connect here for raw MQTT over TCP
stream {
    server {
        listen 1883;
        proxy_pass mqtt:1883;
    }
}

events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend-1:5173;
        server frontend-2:5173;
    }

    upstream backend {
        server backend:8787;
    }

    server {
        listen 80;

        # --- Backend API ---
        location ~ ^/(auth|admin|flightplan|basestation|sensor|sensor-image) {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- MQTT over WebSocket (frontend broker connection) ---
        location /mqtt {
            proxy_pass          http://mqtt:9001;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  86400s;
        }

        # --- Frontend (load balanced, with Vite HMR WebSocket support) ---
        location / {
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              localhost;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }
    }
}
