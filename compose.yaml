services:
  frontend-1:
    container_name: frontend-1
    build:
      context: ./AgroDroneFrontend
      dockerfile: Dockerfile
    volumes:
      - ./AgroDroneFrontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  frontend-2:
    container_name: frontend-2
    build:
      context: ./AgroDroneFrontend
      dockerfile: Dockerfile
    volumes:
      - ./AgroDroneFrontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  backend:
    build:
      context: ./AgroDroneBackend
      dockerfile: Dockerfile
    volumes:
      - ./AgroDroneBackend:/app
      - /app/node_modules
      - wrangler_state:/app/.wrangler
    depends_on:
      mqtt:
        condition: service_healthy
    command: >
      sh -c "npm install && npm run dev -- --ip 0.0.0.0
      --var MQTT_BROKER_URL:ws://mqtt:9001
      --var ALLOWED_ORIGINS:http://localhost"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8787',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  mqtt:
    image: eclipse-mosquitto:latest
    entrypoint:
      - sh
      - -c
      - |
        [ -f /mosquitto/dynamic-security/dynamic-security.json ] || \
          cp /mosquitto/bootstrap/dynamic-security.json /mosquitto/dynamic-security/dynamic-security.json
        exec /docker-entrypoint.sh mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./MQTT/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./MQTT/dynamic-security.bootstrap.json:/mosquitto/bootstrap/dynamic-security.json:ro
      - mqtt_dynsec:/mosquitto/dynamic-security
      - ./MQTT/data:/mosquitto/data
      - ./MQTT/log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "1883:1883"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend-1:
        condition: service_healthy
      frontend-2:
        condition: service_healthy
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy

volumes:
  wrangler_state:
  mqtt_dynsec:
