name: agrodrone

services:
  frontend-1:
    container_name: frontend-1
    build:
      context: ./AgroDroneFrontend
      dockerfile: Dockerfile
    volumes:
      - ./AgroDroneFrontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend-2:
    container_name: frontend-2
    build:
      context: ./AgroDroneFrontend
      dockerfile: Dockerfile
    volumes:
      - ./AgroDroneFrontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./AgroDroneBackend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./AgroDroneBackend:/app
      - /app/node_modules
      - wrangler_state:/app/.wrangler
    depends_on:
      mqtt:
        condition: service_healthy
    command: >
      sh -c "npm run dev -- --ip 0.0.0.0
      --var MQTT_BROKER_URL:ws://mqtt:9001
      --var ALLOWED_ORIGINS:http://localhost,https://agrodrone.app
      --var VALID_ADMIN_ACCESS_TOKENS:${VALID_ADMIN_ACCESS_TOKENS},${DEMO_ADMIN_ACCESS_TOKEN}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8787',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  mqtt:
    image: eclipse-mosquitto:latest
    stop_grace_period: 30s
    entrypoint:
      - sh
      - -c
      - |
        [ -f /mosquitto/dynamic-security/dynamic-security.json ] || \
          cp /mosquitto/bootstrap/dynamic-security.json /mosquitto/dynamic-security/dynamic-security.json
        exec /docker-entrypoint.sh mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./MQTT/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./MQTT/dynamic-security.bootstrap.json:/mosquitto/bootstrap/dynamic-security.json:ro
      - ./MQTT/dynsec:/mosquitto/dynamic-security
      - ./MQTT/data:/mosquitto/data
      - ./MQTT/log:/mosquitto/log
    ports:
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 5s

  demo-orchestrator:
    build:
      context: ./demo-orchestrator
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DEMO_TOKEN:                   ${DEMO_TOKEN}
      DEMO_ADMIN_EMAIL:             demo-admin@agrodrone.app
      DEMO_ADMIN_PASSWORD:          ${DEMO_ADMIN_PASSWORD}
      DEMO_ADMIN_ACCESS_TOKEN:      ${DEMO_ADMIN_ACCESS_TOKEN}
      BACKEND_URL:                  http://backend:8787
      DOCKER_NETWORK:               agrodrone_default
      EDGE_NODE_IMAGE:              agrodrone-edge-node:latest
      ORCHESTRATOR_URL:             http://demo-orchestrator:8090
      MAX_ACTIVE_DEMO_SESSIONS:     "10"
      MAX_SESSIONS_PER_IP_PER_HOUR: "3"
    depends_on:
      backend:
        condition: service_healthy

  # Edge node image — built by compose but never started; demo-orchestrator docker runs it per session
  edge-node:
    build:
      context: ./AgroDrone-Edge-Node
      dockerfile: Dockerfile
    image: agrodrone-edge-node:latest
    restart: "no"
    entrypoint: ["true"]

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend-1:
        condition: service_healthy
      frontend-2:
        condition: service_healthy
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      demo-orchestrator:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

  # ── Observability stack ────────────────────────────────────────────────────

  influxdb:
    image: influxdb:2
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:         setup
      DOCKER_INFLUXDB_INIT_USERNAME:     admin
      DOCKER_INFLUXDB_INIT_PASSWORD:     ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG:          agrodrone
      DOCKER_INFLUXDB_INIT_BUCKET:       telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:  ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  telegraf:
    image: telegraf:1.32
    volumes:
      - ./MQTT/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      MQTT_ADMIN_PASSWORD:  ${MQTT_ADMIN_PASSWORD}
      INFLUXDB_TOKEN:       ${INFLUXDB_TOKEN}
    depends_on:
      mqtt:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD:       ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:           "false"
      GF_FEATURE_TOGGLES_ENABLE:        publicDashboards
      INFLUXDB_TOKEN:                   ${INFLUXDB_TOKEN}
      GF_SERVER_ROOT_URL:               "https://agrodrone.app/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH:    "true"
      GF_AUTH_ANONYMOUS_ENABLED:        "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:       Viewer
      GF_SECURITY_ALLOW_EMBEDDING:      "true"
      GF_LOG_FILTERS:                   migrator:error
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  wrangler_state:
  influxdb_data:
  grafana_data:
