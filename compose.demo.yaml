##
## Demo mode — full stack with a simulated edge node.
##
## The `setup` service auto-provisions demo accounts via the real backend,
## then the `edge-node` streams simulated telemetry and executes flight plans.
##
## Run:
##   docker compose -f compose.demo.yaml up --build
##
## Log in at http://localhost:8080 with:
##   Email:    demo-client@agrodrone.com
##   Password: DemoClient1!
##
## Draw a flight plan near Boston Common → Save Mission → Activate
## Watch the drone fly through the waypoints and return.
##
## To stop and reset:
##   docker compose -f compose.demo.yaml down -v
##   (-v removes demo volumes so the next run starts clean)
##   This does NOT affect accounts or data in the regular compose stack.
##

name: agrodrone-demo

services:

  mqtt:
    container_name: demo-mqtt
    image: eclipse-mosquitto:latest
    entrypoint:
      - sh
      - -c
      - |
        [ -f /mosquitto/dynamic-security/dynamic-security.json ] || \
          cp /mosquitto/bootstrap/dynamic-security.json /mosquitto/dynamic-security/dynamic-security.json
        exec /docker-entrypoint.sh mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./MQTT/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./MQTT/dynamic-security.bootstrap.json:/mosquitto/bootstrap/dynamic-security.json:ro
      - demo_mqtt_dynsec:/mosquitto/dynamic-security
      - ./MQTT/data:/mosquitto/data
      - ./MQTT/log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    container_name: demo-backend
    build:
      context: ./AgroDroneBackend
      dockerfile: Dockerfile
    volumes:
      - ./AgroDroneBackend:/app
      - /app/node_modules
      - demo_wrangler:/app/.wrangler
    depends_on:
      mqtt:
        condition: service_healthy
    command: >
      sh -c "npm install && npm run dev -- --ip 0.0.0.0
      --var MQTT_BROKER_URL:ws://mqtt:9001
      --var ALLOWED_ORIGINS:http://localhost,http://localhost:8080
      --var VALID_ADMIN_ACCESS_TOKENS:AGRO-ADMIN-TOKEN-1"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8787',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  frontend-1:
    container_name: demo-frontend
    build:
      context: ./AgroDroneFrontend
      dockerfile: Dockerfile
    volumes:
      - ./AgroDroneFrontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  influxdb:
    container_name: demo-influxdb
    image: influxdb:2
    environment:
      DOCKER_INFLUXDB_INIT_MODE:         setup
      DOCKER_INFLUXDB_INIT_USERNAME:     admin
      DOCKER_INFLUXDB_INIT_PASSWORD:     ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG:          agrodrone
      DOCKER_INFLUXDB_INIT_BUCKET:       telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:  ${INFLUXDB_TOKEN}
    volumes:
      - demo_influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  telegraf:
    container_name: demo-telegraf
    image: telegraf:1.32
    volumes:
      - ./MQTT/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      MQTT_ADMIN_PASSWORD:  ${MQTT_ADMIN_PASSWORD}
      INFLUXDB_TOKEN:       ${INFLUXDB_TOKEN}
    depends_on:
      mqtt:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  grafana:
    container_name: demo-grafana
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD:       ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:           "false"
      GF_FEATURE_TOGGLES_ENABLE:        publicDashboards
      INFLUXDB_TOKEN:                   ${INFLUXDB_TOKEN}
      GF_SERVER_ROOT_URL:               "http://localhost:8080/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH:    "true"
      GF_AUTH_ANONYMOUS_ENABLED:        "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:       Viewer
      GF_SECURITY_ALLOW_EMBEDDING:      "true"
    volumes:
      - demo_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy

  nginx:
    container_name: demo-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.demo.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend-1:
        condition: service_healthy
      backend:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      grafana:
        condition: service_started

  # setup and edge-node talk to backend directly over the Docker network —
  # no nginx needed since these are server-side processes, not browsers.
  setup:
    container_name: demo-setup
    build:
      context: ./tests/e2e
    command: python setup_demo.py
    environment:
      BACKEND_URL: "http://backend:8787"
    volumes:
      - demo_shared:/shared
    depends_on:
      - backend

  edge-node:
    container_name: demo-edge-node
    build:
      context: ./AgroDrone-Edge-Node
      dockerfile: Dockerfile
    command: python src/demo/demo_node.py
    environment:
      MQTT_HOST: "mqtt"
      MQTT_PORT: "1883"
      BACKEND_URL: "http://backend:8787"
    volumes:
      - demo_shared:/shared
    depends_on:
      setup:
        condition: service_completed_successfully

volumes:
  demo_shared:
  demo_wrangler:
  demo_mqtt_dynsec:
  demo_influxdb_data:
  demo_grafana_data:
