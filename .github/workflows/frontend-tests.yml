name: Frontend Unit Tests

on:
  push:
    branches: [main, master]
    paths:
      - "AgroDroneFrontend/**"
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    paths:
      - "AgroDroneFrontend/**"
      - ".github/workflows/frontend-tests.yml"

jobs:
  unit-tests:
    name: Vitest unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AgroDroneFrontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AgroDroneFrontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose
        # vitest auto-detects CI=true (set by GitHub Actions) and runs once
        # without watch mode, but --run makes it explicit.
        # --reporter=verbose prints each test name so failures are easy to find.
