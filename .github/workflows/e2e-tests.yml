name: E2E Tests

on:
  push:
    branches: [main, master]
    paths:
      - "AgroDroneBackend/**"
      - "AgroDrone-Edge-Node/**"
      - "MQTT/**"
      - "tests/e2e/**"
      - "compose.integration.yaml"
      - "compose.test.yaml"
      - "compose.dynamic.yaml"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    paths:
      - "AgroDroneBackend/**"
      - "AgroDrone-Edge-Node/**"
      - "MQTT/**"
      - "tests/e2e/**"
      - "compose.integration.yaml"
      - "compose.test.yaml"
      - "compose.dynamic.yaml"
      - ".github/workflows/e2e-tests.yml"

jobs:

  integration:
    name: Integration tests (full flow)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backend .dev.vars for CI
        run: |
          {
            echo "MQTT_BROKER_HOST=mqtt"
            echo "MQTT_BROKER_PORT=1883"
            echo "MQTT_ADMIN_USERNAME=agrodrone-backend"
            echo "MQTT_ADMIN_PASSWORD=test-admin-pass"
            echo "JWT_SECRET=ci-test-secret-not-for-production"
            echo "VALID_ACCESS_TOKENS=AGRO-ALPHA-TOKEN-1,AGRO-ALPHA-TOKEN-2,AGRO-ALPHA-TOKEN-3"
            echo "VALID_ADMIN_ACCESS_TOKENS=AGRO-ADMIN-TOKEN-1,AGRO-ADMIN-TOKEN-2"
          } > AgroDroneBackend/.dev.vars

      - name: Run integration tests
        run: |
          docker compose -f compose.integration.yaml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from test-runner

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f compose.integration.yaml logs

      - name: Tear down
        if: always()
        run: docker compose -f compose.integration.yaml down -v

  multi-tenant:
    name: Multi-tenant ACL tests (pre-seeded)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run multi-tenant tests
        run: |
          docker compose -f compose.test.yaml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from test-runner

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f compose.test.yaml logs

      - name: Tear down
        if: always()
        run: docker compose -f compose.test.yaml down -v

  dynamic-routing:
    name: Dynamic routing tests (runtime provisioning)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dynamic routing tests
        run: |
          docker compose -f compose.dynamic.yaml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from test-runner

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f compose.dynamic.yaml logs

      - name: Tear down
        if: always()
        run: docker compose -f compose.dynamic.yaml down -v
