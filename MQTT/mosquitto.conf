per_listener_settings false
allow_anonymous false
persistence_location /mosquitto/data/

# Mosquitto Dynamic Security plugin — manages client credentials and ACLs at runtime.
# The backend publishes commands to $CONTROL/dynamic-security/v1 to add/update clients.
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/dynamic-security/dynamic-security.json

listener 1883
protocol mqtt

listener 9001
protocol websockets
