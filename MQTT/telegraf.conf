[agent]
  interval          = "5s"
  flush_interval    = "5s"
  precision         = "1ms"
  omit_hostname     = true

# ── MQTT consumer ─────────────────────────────────────────────────────────────
# Subscribes to all telemetry topics using the backend admin credentials
# (admin has subscribe permission on every topic).
# Connects via plain TCP on port 1883 — internal Docker network only.

[[inputs.mqtt_consumer]]
  servers           = ["tcp://mqtt:1883"]
  topics            = ["+/telemetry"]
  username          = "agrodrone-backend"
  password          = "${MQTT_ADMIN_PASSWORD}"
  client_id         = "telegraf-consumer"
  qos               = 0
  connection_timeout = "30s"
  persistent_session = false

  data_format       = "json_v2"

  # Extract userId from the first topic segment: "<userId>/telemetry"
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "+/telemetry"
    tags  = "userId/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name   = "telemetry"
    timestamp_path     = "timestamp"
    timestamp_format   = "unix"

    # Grab every numeric/boolean field except the array fields
    [[inputs.mqtt_consumer.json_v2.object]]
      path          = "@this"
      excluded_keys = ["timestamp", "base_station_position"]

# ── InfluxDB v2 output ────────────────────────────────────────────────────────

[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "${INFLUXDB_TOKEN}"
  organization = "agrodrone"
  bucket       = "telemetry"
